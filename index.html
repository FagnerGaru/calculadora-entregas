<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Entregas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1>🚚 Calculadora de Entregas</h1>
<p>Consulte o valor e solicite pelo WhatsApp.</p>

<label>Local de Coleta</label>
<input type="hidden" id="origem">

<h3>Dados da Coleta</h3>

<input id="nomeDestino" placeholder="Nome (opcional)">
<input id="telefoneDestino" placeholder="Telefone (opcional)">
<input id="ruaDestino" placeholder="Rua (opcional)">
<input id="numeroDestino" placeholder="Número (opcional)">
<input id="complementoDestino" placeholder="Complemento (opcional)">
<select id="principal"></select>

<div id="extras"></div>

<h2>Destino da Entrega</h2>

<input type="text" id="nomeColeta" placeholder="Seu nome" required>

<input type="tel" id="telefoneColeta" placeholder="Seu telefone" required>

<input type="text" id="ruaColeta" placeholder="Rua" required>

<input type="text" id="numeroColeta" placeholder="Número" required>

<input type="text" id="complementoColeta"
placeholder="Apartamento, casa, bloco, referência (opcional)">

<label>Bairro da Coleta</label>
<select id="bairroColeta"></select>
<button onclick="addExtra()">+ Adicionar Destino</button>

<h2 id="total">Total: R$ 0,00</h2>

<button class="whats" onclick="enviar()">Solicitar Entrega</button>
</div>
<script src="script.js"></script>
</body>
</html>
